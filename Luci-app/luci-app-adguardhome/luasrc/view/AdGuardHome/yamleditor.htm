<%+cbi/valueheader%>
<script src="<%=resource%>/codemirror/lib/codemirror.js"></script>
<link rel="stylesheet" href="<%=resource%>/codemirror/lib/codemirror.css"/>
<script src="<%=resource%>/codemirror/mode/yaml/yaml.js"></script>
<link rel="stylesheet" href="<%=resource%>/codemirror/theme/dracula.css"/>
<link rel="stylesheet" href="<%=resource%>/codemirror/addon/fold/foldgutter.css"/>
<script src="<%=resource%>/codemirror/addon/fold/foldcode.js"></script>
<script src="<%=resource%>/codemirror/addon/fold/foldgutter.js"></script>
<script src="<%=resource%>/codemirror/addon/fold/indent-fold.js"></script>
<style>
	.adh-editor-tools {
		display: flex;
		flex-wrap: wrap;
		gap: 10px;
		margin-top: 12px;
	}
</style>
<script type="text/javascript">//<![CDATA[
var editor = CodeMirror.fromTextArea(document.getElementById("cbid.AdGuardHome.AdGuardHome.escconf"), {
mode: "text/yaml",    //实现groovy代码高亮
styleActiveLine: true,
lineNumbers: true,	//显示行号
theme: "dracula",	//设置主题
lineWrapping: true,	//代码折叠
foldGutter: true,
gutters: ["CodeMirror-linenumbers", "CodeMirror-foldgutter"],
matchBrackets: true //括号匹配
}
);
editor.setSize(null, 720);
function reload_config(){
	XHR.get('<%=url([[admin]], [[services]], [[AdGuardHome]], [[reloadconfig]])%>', null,
	function(x, data) {
	location.reload();
	});}
function use_template(){
	XHR.get('<%=url([[admin]], [[services]], [[AdGuardHome]], [[gettemplateconfig]])%>', null,
	function(x, data) {
	editor.setValue(x.responseText)
	});}
//]]>
</script> 
<%fs=require"nixio.fs"%>
<div class="adh-editor-tools">
<%if fs.access("/tmp/AdGuardHometmpconfig.yaml") then%>
<input type="button" class="cbi-button cbi-button-action" id="apply_update_button" value="<%:Reload Config%>" onclick=" return reload_config() "/>
<%end%>
<input type="button" class="cbi-button cbi-button-apply" id="template_button" value="<%:Use template%>" onclick=" return use_template() "/>
</div>
<%+cbi/valuefooter%>
